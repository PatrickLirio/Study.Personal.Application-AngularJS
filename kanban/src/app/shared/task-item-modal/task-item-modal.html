<div class="modal-header">
  <h5 class="modal-title">Modal title</h5>
  <button type="button" class="btn-close" (click)="activeModal.dismiss()"></button>
</div>
<div class="modal-body">
  <div class="row g-3">
    <!-- Dropdown full col-lg-6 -->
    <div class="col-lg-6">
      <div class="dropdown w-100">
        <button
          class="btn btn-outline-secondary dropdown-toggle w-100 text-start"
          type="button"
          data-bs-toggle="dropdown"
          aria-expanded="false"
        >
          Select Status
        </button>
        <ul class="dropdown-menu w-100">
          <li><a class="dropdown-item" href="#">TO DO</a></li>
          <li><a class="dropdown-item" href="#">IN PROGRESS</a></li>
          <li><a class="dropdown-item" href="#">REVIEW</a></li>
          <li><a class="dropdown-item" href="#">DONE</a></li>
        </ul>
      </div>
    </div>

    <!-- DateTime picker full col-lg-6 -->
    <div class="col-lg-6">
      <div class="input-group">
        <span class="input-group-text">Select Date & Time</span>
        <input
          type="datetime-local"
          class="form-control"
          id="due-datetime"
          name="due-datetime"
          value="2019-06-17T12:00"
        />
      </div>
    </div>
  </div>

  <div class="row g-3 mt-2">
    <!-- Task Title full col-lg-12 -->
    <div class="col-lg-12">
      <input type="text" class="form-control" id="task-title" placeholder="Task Title" />
    </div>

    <!-- Task Description full col-lg-12 -->
    <div class="col-lg-12">
      <textarea
        class="form-control"
        id="task-description"
        rows="4"
        placeholder="Task Description"
      ></textarea>
    </div>
  </div>

  <div class="row g-3 my-2">
    <!-- Subtasks full col-lg-12 -->
    <div class="col-lg-6">
      <div class="dropdown w-100">
        <button
          class="btn btn-outline-secondary dropdown-toggle w-100 text-start"
          type="button"
          data-bs-toggle="dropdown"
          aria-expanded="false"
        >
          Assigned to:
        </button>
        <ul class="dropdown-menu w-100">
          <li><a class="dropdown-item" href="#">User 1</a></li>
          <li><a class="dropdown-item" href="#">User 2</a></li>
          <li><a class="dropdown-item" href="#">User 3</a></li>
          <li><a class="dropdown-item" href="#">User 4</a></li>
        </ul>
      </div>
    </div>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" (click)="activeModal.close()">Close</button>
    <button type="button" class="btn btn-primary">Save changes</button>
  </div>
</div>
